spring:
  application:
    name: ollama
  datasource:
    url: jdbc:mariadb://localhost:3308/ETLdatabase
    username: root
    password: password
  ai:
    chat:
      client:
        enable: true
    vectorstore:
      mariadb:
        initialize-schema: true
        distance-type: COSINE
        dimensions: 1024
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: mxbai-embed-large:latest
      chat:
        model: gemma3:1b #for normal LLM
        temperature: 0.7
logging:
  level:
   org.springframework.ai.chat.client.advisor: DEBUG
server:
  port: 9009
